name: test
on:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Test bootc image builder
    runs-on: ubuntu-26.04
    steps:
      - run: |
          bootc_image='quay.io/fedora/fedora-bootc:44
          sudo podman pull "${bootc_image}"
          mkdir output
  
          cat <<'EOF' > config.toml
          [[customizations.user]]
          name = "core"
          groups = ["wheel"]
          EOF
          sudo podman run \
            --rm \
            -it \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v ./output:/output \
            -v ./config.toml:/config.toml:ro \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type qcow2 \
            --use-librepo=True \
            --rootfs btrfs \
            --progress verbose \
            "${bootc_image}"
