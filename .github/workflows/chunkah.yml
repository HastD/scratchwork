name: chunkah
on:
  workflow_dispatch: # allow manually triggering builds

permissions: {}

concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  chunkah:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Run Chunkah
        run: |
          image_ref='quay.io/fedora/fedora-iot:44'
          podman pull "${image_ref}"
          export CHUNKAH_CONFIG_STR="$(podman inspect "${image_ref}")"
          podman run --rm --mount="type=image,src=${image_ref},destination=/chunkah" \
            -e CHUNKAH_CONFIG_STR quay.io/coreos/chunkah:latest build \
            --prune /sysroot/ --max-layers 72 --label ostree.commit- --label ostree.final-diffid- \
            -t ghcr.io/hastd/fedora-iot-chunked:latest | podman load

      - name: Push image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GH_TOKEN}" | podman login ghcr.io -u hastd --password-stdin
          podman push ghcr.io/hastd/fedora-iot-chunked:latest
          podman push ghcr.io/hastd/fedora-iot-chunked:latest

      - name: Print manifest (local)
        run: |
          podman unshare skopeo inspect -n containers-storage:ghcr.io/hastd/fedora-iot-chunked:latest

      - name: Print manifest (remote)
        run: |
          skopeo inspect -n docker://ghcr.io/hastd/fedora-iot-chunked:latest
