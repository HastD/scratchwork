name: chunkah
on:
  workflow_dispatch:

permissions: {}

concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  chunkah:
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        tag:
          - 20260531
          - 20260601
          - 20260602
          - 20260603
          - 20260604
          - 20260605
          - 20260606
          - 20260607
          - 20260608
          - 20260609
          - 20260610
          - 20260611
          - 20260612
          - 20260613
          - 20260614
          - 20260615
          - 20260616
          - 20260617
          - 20260618
          - 20260619
          - 20260620
          - 20260621
          - 20260622
          - 20260623
          - 20260624
          - 20260625
          - 20260626
          - 20260627
          - 20260628
          - 20260629
          - 20260630
    steps:
      - name: Free disk space
        uses: hastd/free-disk-space@v0.1.2
        with:
          skip-if-available: 64G

      - name: Run Chunkah
        env:
          IMAGE_TAG: ${{ matrix.tag }}
        run: |
          set -euxo pipefail
          image_ref="ghcr.io/secureblue/kinoite-main-hardened:${IMAGE_TAG}"
          podman pull "${image_ref}"
          temp_dir="$(mktemp -d)"
          config_file="${temp_dir}/chunkah-config.json"
          podman inspect "${image_ref}" > "${config_file}"
          oci_dir="${temp_dir}/oci-out"
          podman run --rm -v "${temp_dir}:${temp_dir}" \
            --mount="type=image,src=${image_ref},destination=/chunkah" \
            ghcr.io/hastd/chunkah:dev build --config "${config_file}" \
            --compressed --prune /sysroot/ --max-layers 128 \
            --label ostree.commit- --label ostree.final-diffid- \
            -t "localhost/secureblue-kinoite-chunkah:${IMAGE_TAG}" --output "oci:${oci_dir}"

          manifest_digest=$(jq -cr '.manifests[0].digest' "${oci_dir}/index.json")
          cp "${oci_dir}/blobs/sha256/${manifest_digest#sha256:}" "manifest-${IMAGE_TAG}.json"

      - name: Upload manifest
        uses: actions/upload-artifact@v7
        with:
          path: ./manifest-${{ matrix.tag }}.json
          if-no-files-found: error
          archive: false

      - name: Pretty-print manifest
        run: |
          jq . manifest-*.json
